openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: assignments
    description: Assignment management and planning
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /assignments:
    get:
      operationId: listAssignments
      tags: [assignments]
      summary: List assignments
      responses:
        "200":
          description: Assignments with calculated planning fields
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"
    post:
      operationId: createAssignment
      tags: [assignments]
      summary: Create assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentInput"
      responses:
        "201":
          description: Created assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
  /assignments/{id}:
    put:
      operationId: updateAssignment
      tags: [assignments]
      summary: Update assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentInput"
      responses:
        "200":
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "404":
          description: Assignment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAssignment
      tags: [assignments]
      summary: Delete assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted assignment
        "404":
          description: Assignment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /assignments/summary:
    get:
      operationId: getAssignmentSummary
      tags: [assignments]
      summary: Get assignment dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentSummary"
  /assignments/recommendations/today:
    get:
      operationId: getDailyRecommendations
      tags: [assignments]
      summary: Get today's study recommendations
      responses:
        "200":
          description: Daily recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPlan"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Difficulty:
      type: string
      enum: [easy, medium, hard]
    Priority:
      type: string
      enum: [High, Medium, Low]
    AssignmentInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        subject:
          type: string
          minLength: 1
        deadline:
          type: string
          format: date
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        estimatedTime:
          type: number
          minimum: 0.5
      required:
        - title
        - subject
        - deadline
        - difficulty
        - estimatedTime
    Assignment:
      allOf:
        - $ref: "#/components/schemas/AssignmentInput"
        - type: object
          properties:
            id:
              type: integer
            priority:
              $ref: "#/components/schemas/Priority"
            startSuggestion:
              type: string
            suggestedStartDate:
              type: string
              format: date
            daysUntilDeadline:
              type: integer
            isMissed:
              type: boolean
            isUpcoming:
              type: boolean
            warning:
              type: string
          required:
            - id
            - priority
            - startSuggestion
            - suggestedStartDate
            - daysUntilDeadline
            - isMissed
            - isUpcoming
            - warning
    AssignmentSummary:
      type: object
      properties:
        total:
          type: integer
        highPriority:
          type: integer
        dueSoon:
          type: integer
        missed:
          type: integer
        totalEstimatedHours:
          type: number
      required:
        - total
        - highPriority
        - dueSoon
        - missed
        - totalEstimatedHours
    DailyPlanItem:
      type: object
      properties:
        assignment:
          $ref: "#/components/schemas/Assignment"
        recommendation:
          type: string
        suggestedMinutesToday:
          type: integer
      required:
        - assignment
        - recommendation
        - suggestedMinutesToday
    DailyPlan:
      type: object
      properties:
        date:
          type: string
          format: date
        message:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/DailyPlanItem"
      required:
        - date
        - message
        - items
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
